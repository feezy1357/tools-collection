<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON工具 · 格式化/压缩/校验 · 在线工具集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f5}
.container{max-width:900px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;text-align:center;padding:36px 16px 28px;border-radius:16px;margin-bottom:16px}
.header h1{font-size:28px;font-weight:800}
.header p{color:#a0a0b0;font-size:13px;margin-top:4px}
.tabs{display:flex;gap:0;margin-bottom:12px;background:#e8e8e8;border-radius:8px;overflow:hidden}
.tabs button{flex:1;padding:10px;border:none;background:transparent;font-size:14px;cursor:pointer;transition:all .2s}
.tabs button.active{background:#1a1a2e;color:#fff;font-weight:600}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:12px}
.card textarea{width:100%;height:250px;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-family:monospace;font-size:13px;resize:vertical;outline:none}
.card textarea:focus{border-color:#c0392b}
.btn-row{display:flex;gap:8px;margin:12px 0}
.btn-row button{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary{background:#c0392b;color:#fff}
.btn-secondary{background:#e0e0e0;color:#333}
.btn-row button:hover{opacity:.8}
.pay-banner{text-align:center;padding:20px;background:linear-gradient(135deg,#fff6f0,#fff);border-radius:12px;border:2px solid #f0e0d8;margin-top:12px}
.pay-banner p{font-size:14px;color:#888;margin-bottom:8px}
.pay-banner img{width:160px;height:auto;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
footer{text-align:center;padding:20px;color:#999;font-size:12px}
.tools-links{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.tools-links a{padding:8px 16px;background:#fff;border-radius:8px;text-decoration:none;color:#555;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tools-links a:hover{background:#1a1a2e;color:#fff}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🛠 JSON 工具</h1>
        <p>格式化 · 压缩 · 校验 · 转换</p>
    </div>
    <div class="tools-links">
        <a href="index.html">🏠 首页</a>
        <a href="md2html.html">📝 Markdown</a>
        <a href="qrcode.html">📱 二维码</a>
        <a href="game2048.html">🎮 2048</a>
    </div>
    <div class="tabs">
        <button class="active" onclick="switchTab('format')">格式化</button>
        <button onclick="switchTab('compress')">压缩</button>
        <button onclick="switchTab('validate')">校验</button>
    </div>
    <div class="card">
        <div id="tab-format">
            <textarea id="input" placeholder='输入 JSON...'>{ "name": "工具集", "version": 1.0, "tools": ["JSON", "Markdown", "QR码"], "free": true }</textarea>
            <div class="btn-row">
                <button class="btn-primary" onclick="formatJSON()">✨ 格式化</button>
                <button class="btn-secondary" onclick="compressJSON()">📦 压缩</button>
                <button class="btn-secondary" onclick="validateJSON()">✅ 校验</button>
                <button class="btn-secondary" onclick="clearAll()">🗑 清空</button>
            </div>
            <textarea id="output" placeholder="输出..." readonly style="background:#f9f9f9"></textarea>
        </div>
    </div>
    <div class="pay-banner">
        <p>☕ 如果这个工具有帮助，欢迎支持</p>
        <img src="alipay_qrcode.png" alt="支付宝收款码">
        <p style="margin-top:8px;font-size:12px;color:#c0392b;">感谢支持！更多工具持续开发中</p>
    </div>
    <footer>向往的服装 · 免费在线工具集</footer>
</div>
<script>
function switchTab(tab) {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}
function getInput() { return document.getElementById('input').value; }
function setOutput(v) { document.getElementById('output').value = v; }
function formatJSON() {
    try { setOutput(JSON.stringify(JSON.parse(getInput()), null, 4)); }
    catch(e) { setOutput('❌ JSON格式错误: ' + e.message); }
}
function compressJSON() {
    try { setOutput(JSON.stringify(JSON.parse(getInput()))); }
    catch(e) { setOutput('❌ JSON格式错误: ' + e.message); }
}
function validateJSON() {
    try { JSON.parse(getInput()); setOutput('✅ JSON 格式正确！'); }
    catch(e) { setOutput('❌ JSON格式错误: ' + e.message); }
}
function clearAll() { document.getElementById('input').value = ''; setOutput(''); }
</script>
</body>
</html>
